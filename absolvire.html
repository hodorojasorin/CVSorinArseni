      // ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────

      const Easing = {
        linear: (t) => t,

        // Quad
        easeInQuad:    (t) => t * t,
        easeOutQuad:   (t) => t * (2 - t),
        easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

        // Cubic
        easeInCubic:    (t) => t * t * t,
        easeOutCubic:   (t) => (--t) * t * t + 1,
        easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

        // Quart
        easeInQuart:    (t) => t * t * t * t,
        easeOutQuart:   (t) => 1 - (--t) * t * t * t,
        easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

        // Expo
        easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
        easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
        easeInOutExpo: (t) => {
          if (t === 0) return 0;
          if (t === 1) return 1;
          if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
          return 1 - 0.5 * Math.pow(2, -20 * t + 10);

      /* combined */

      // ── Brand tokens ─────────────────────────────────────────────────────────────
      const NAVY  = '#1a293a';
      const NAVY2 = '#13202e';   // deeper shade for layering
      const RED   = '#df163c';
      const TEAL  = '#20a4a2';
      const WHITE = '#f3f6f8';
      // light theme (inverted palette): paper background, ink (navy) text
      const PAPER  = '#f4f6f8';
      const PAPER2 = '#e3e9ee';
      const INK    = NAVY;
      const HEAD  = "'Roboto Slab', Georgia, serif";
      const BODY  = "'Open Sans', system-ui, sans-serif";

      const W = 1920, H = 1080;

      window.CEITI = { NAVY, NAVY2, RED, TEAL, WHITE, PAPER, PAPER2, INK, HEAD, BODY, W, H };

      // ── Theme system (light = white bg / ink text, dark = navy bg / white text) ──
      const THEMES = {
        light: { bg: '#f4f6f8', bg2: '#e3e9ee', vignette: '#ffffff', ink: '#1a293a',
                 grid: 'rgba(26,41,58,0.05)', ghost: 'rgba(26,41,58,0.06)',
                 sub: 'rgba(26,41,58,0.78)', edgeShadow: 'rgba(26,41,58,0.4)',
                 logoKey: 'ceitiLogo', logoFile: 'assets/ceiti-logo.png' },
        dark:  { bg: '#1a293a', bg2: '#13202e', vignette: '#1a293a', ink: '#f3f6f8',
                 grid: 'rgba(255,255,255,0.04)', ghost: 'rgba(255,255,255,0.06)',
                 sub: 'rgba(243,246,248,0.82)', edgeShadow: 'rgba(255,255,255,0.5)',
                 logoKey: 'ceitiLogoDark', logoFile: 'assets/ceiti-logo-dark.png' },
      };
      const CeitiThemeContext = React.createContext(THEMES.light);
      function useTheme() { return React.useContext(CeitiThemeContext); }
      window.THEMES = THEMES;
      window.CeitiThemeContext = CeitiThemeContext;
      window.useTheme = useTheme;

      // helper: eased segment value
      function seg(t, a, b, ease = Easing.easeOutCubic) {
        if (t <= a) return 0;
        if (t >= b) return 1;
        return ease((t - a) / (b - a));
      }

      // ── Backdrop ─────────────────────────────────────────────────────────────────
      // Navy base + faint drifting geometry + a fine baseline grid. Always-on ambient.
      function Backdrop({ tint = 'navy' }) {
        const t = useTime();
        const th = useTheme();
        const drift = Math.sin(t * 0.5) * 14;
        const drift2 = Math.cos(t * 0.4) * 18;
        const accent = tint === 'red' ? RED : TEAL;
        return (
          <div style={{ position: 'absolute', inset: 0, background: th.bg, overflow: 'hidden' }}>
            {/* soft vignette gradient */}
            <div style={{ position: 'absolute', inset: 0,
              background: `radial-gradient(120% 120% at 78% 12%, ${th.vignette} 38%, ${th.bg2} 100%)` }} />
            {/* fine vertical grid lines */}
            {[300, 700, 1100, 1500, 1900].map((x, i) => (
              <div key={i} style={{ position: 'absolute', left: x, top: 0, width: 1, height: H,
                background: th.grid }} />
            ))}
          </div>
        );
      }

      // ── Diagonal sweep lines ─────────────────────────────────────────────────────
      // Thin accent lines that slide across the frame during the intro build.
      function SweepLines({ start = 0.1 }) {
        const t = useTime();
        const a = seg(t, start, start + 0.6, Easing.easeOutQuart);
        const b = seg(t, start + 0.25, start + 0.95, Easing.easeOutQuart);
        const Line = (p, color, top, len, thick) => (
          <div style={{ position: 'absolute', top, left: 0, width: W, height: thick,
            transform: `rotate(-12deg)`, transformOrigin: 'left center',
            pointerEvents: 'none' }}>
            <div style={{ position: 'absolute', left: `${-110 + p * 130}%`, width: len, height: thick,
              background: color, boxShadow: `0 0 24px ${color}88` }} />
          </div>
        );
        return (
          <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none' }}>
            {Line(a, RED, 232, '58%', 6)}
            {Line(b, TEAL, 1012, '30%', 6)}
          </div>
        );
      }

      // ── Corner marks ─────────────────────────────────────────────────────────────
      // Consistent L-brackets that slide in. Visual frame anchor reused on every slide.
      function CornerMarks({ start = 0.3 }) {
        const t = useTime();
        const p = seg(t, start, start + 0.5, Easing.easeOutBack);
        const off = (1 - p) * 60;
        const len = 120, thick = 7;
        const mark = (style, dx, dy) => (
          <div style={{ position: 'absolute', opacity: clamp(p * 1.4, 0, 1),
            transform: `translate(${dx}px,${dy}px)`, ...style }} />
        );
        return (
          <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
            {/* top-left red bracket */}
            {mark({ left: 90, top: 90, width: len, height: thick, background: RED }, -off, 0)}
            {mark({ left: 90, top: 90, width: thick, height: len, background: RED }, 0, -off)}
            {/* bottom-right teal bracket */}
            {mark({ right: 90, bottom: 90, width: len, height: thick, background: TEAL }, off, 0)}
            {mark({ right: 90, bottom: 90, width: thick, height: len, background: TEAL }, 0, off)}
          </div>
        );
      }

      // ── Logo badge ───────────────────────────────────────────────────────────────
      // CEITI logo (white version). mode 'corner' = small top-left on content slides.
      // mode 'hero' = large centered (slide 1 / 14). Reveals behind a wiping bar.
      function LogoBadge({ mode = 'corner', start = 0.2, x, y, width }) {
        const t = useTime();
        const th = useTheme();
        const isHero = mode === 'hero';
        const w = width || (isHero ? 760 : 300);
        const px = x != null ? x : (isHero ? (W - w) / 2 : 96);
        const py = y != null ? y : (isHero ? 250 : 92);

        const rev = seg(t, start, start + 0.7, Easing.easeOutCubic);   // wipe reveal
        const pop = seg(t, start, start + 0.85, Easing.easeOutBack);   // scale settle
        const scale = 0.9 + 0.1 * pop;
        // clip from left to right
        const clip = `inset(0 ${(1 - rev) * 100}% 0 0)`;
        const barX = px + rev * w;
        const barColor = isHero ? RED : TEAL;

        return (
          <div style={{ position: 'absolute', left: px, top: py, width: w, height: w * 0.225,
            transform: `scale(${scale})`, transformOrigin: 'left center' }}>
            <img src={(window.__resources && window.__resources[th.logoKey]) || th.logoFile} alt="CEITI"
              style={{ position: 'absolute', inset: 0, width: '100%', height: '100%',
                objectFit: 'contain', clipPath: clip,
                opacity: rev > 0 ? 1 : 0 }} />
            {/* wiping edge bar */}
            {rev > 0.001 && rev < 0.999 && (
              <div style={{ position: 'absolute', left: rev * w - 10, top: -6, width: 10,
                height: w * 0.225 + 12, background: barColor, boxShadow: `0 0 22px ${barColor}` }} />
            )}
          </div>
        );
      }

      // ── Title reveal ─────────────────────────────────────────────────────────────
      // Headline behind a colored bar that opens laterally. Roboto Slab Bold.
      // align 'left' anchors at x; 'center' centers on x (treated as center X).
      function TitleReveal({
        text, x = 160, y = 440, size = 132, color = null, barColor = RED,
        start = 0, align = 'left', maxWidth = 1500, weight = 700, letterSpacing = '-0.01em',
      }) {
        const t = useTime();
        const th = useTheme();
        const col = color || th.ink;
        // phase A: bar grows to cover  | phase B: bar exits + text revealed
        const grow = seg(t, start, start + 0.32, Easing.easeOutQuart);
        const open = seg(t, start + 0.32, start + 0.9, Easing.easeInOutCubic);
        // text clip reveals as bar passes
        const clip = `inset(0 ${(1 - open) * 100}% 0 0)`;

        const wrap = {
          position: 'absolute', top: y, maxWidth,
          ...(align === 'center'
            ? { left: x, transform: 'translateX(-50%)' }
            : { left: x }),
        };
        return (
          <div style={wrap}>
            <div style={{ position: 'relative', display: 'inline-block' }}>
              <div style={{ fontFamily: HEAD, fontWeight: weight, fontSize: size, color: col,
                lineHeight: 1.0, letterSpacing, whiteSpace: 'nowrap', clipPath: clip }}>{text}</div>
              {/* covering / opening bar */}
              {(grow > 0 && open < 0.999) && (
                <div style={{ position: 'absolute', top: -6, bottom: -10,
                  left: `${open * 100}%`, right: `${(1 - grow) * 100}%`,
                  background: barColor }} />
              )}
              {/* leading edge */}
              {open > 0.001 && open < 0.999 && (
                <div style={{ position: 'absolute', top: -8, bottom: -12,
                  left: `calc(${open * 100}% - 6px)`, width: 6, background: th.ink,
                  boxShadow: `0 0 20px ${th.edgeShadow}` }} />
              )}
            </div>
          </div>
        );
      }

      // ── Sub reveal ───────────────────────────────────────────────────────────────
      // Secondary text: fade + slide up. Open Sans.
      function SubReveal({
        text, x = 164, y = 600, size = 42, color = null,
        start = 0, align = 'left', weight = 400, letterSpacing = '0.01em', accent = false, strong = false,
      }) {
        const t = useTime();
        const th = useTheme();
        const col = color || (strong ? th.ink : th.sub);
        const p = seg(t, start, start + 0.55, Easing.easeOutCubic);
        const ty = (1 - p) * 26;
        return (
          <div style={{ position: 'absolute', top: y, left: x, opacity: p,
            transform: `translate(${align === 'center' ? '-50%' : '0'}, ${ty}px)`,
            fontFamily: BODY, fontWeight: weight, fontSize: size, color: col, letterSpacing,
            whiteSpace: 'pre' }}>
            {accent && (
              <span style={{ display: 'inline-block', width: clamp(p, 0, 1) * 56, height: 4,
                background: TEAL, verticalAlign: 'middle', marginRight: 18, borderRadius: 2 }} />
            )}
            {text}
          </div>
        );
      }

      // ── Kicker / eyebrow chip ────────────────────────────────────────────────────
      function Kicker({ text, x = 164, y = 360, start = 0, color = RED }) {
        const t = useTime();
        const p = seg(t, start, start + 0.4, Easing.easeOutBack);
        return (
          <div style={{ position: 'absolute', top: y, left: x, opacity: clamp(p * 1.3, 0, 1),
            transform: `translateX(${(1 - p) * -20}px)`, display: 'flex', alignItems: 'center', gap: 16 }}>
            <div style={{ width: 14 + p * 0, height: 36, background: color, transform: `scaleY(${p})`,
              transformOrigin: 'center' }} />
            <span style={{ fontFamily: BODY, fontWeight: 700, fontSize: 26, letterSpacing: '0.28em',
              color: useTheme().ink, textTransform: 'uppercase' }}>{text}</span>
          </div>
        );
      }

      // ── Geometric shape burst ────────────────────────────────────────────────────
      // A small set of shapes that slide / scale / rotate into the composition.
      // `seed` varies the arrangement per slide so it doesn't feel repetitive.
      function ShapeBurst({ start = 0.4, seed = 0 }) {
        const t = useTime();
        const presets = [
          // each: {kind, x, y, w, h, color, rot, from:[dx,dy]}
          [
            { k: 'rect', x: 1500, y: 760, w: 220, h: 220, c: RED,  rot: 0,  from: [220, 0] },
            { k: 'ring', x: 1610, y: 180, w: 160, h: 160, c: TEAL, rot: 0,  from: [0, -160] },
            { k: 'bar',  x: 1660, y: 520, w: 14,  h: 260, c: WHITE, rot: 0, from: [0, 200] },
            { k: 'diam', x: 1380, y: 470, w: 90,  h: 90,  c: TEAL, rot: 45, from: [120, 0] },
          ],
          [
            { k: 'ring', x: 1500, y: 720, w: 240, h: 240, c: RED,  rot: 0,  from: [0, 240] },
            { k: 'rect', x: 1650, y: 200, w: 150, h: 150, c: TEAL, rot: 0,  from: [180, 0] },
            { k: 'bar',  x: 1440, y: 250, w: 220, h: 12,  c: WHITE, rot: 0, from: [-200, 0] },
            { k: 'diam', x: 1700, y: 560, w: 80,  h: 80,  c: RED,  rot: 45, from: [0, 160] },
          ],
          [
            { k: 'rect', x: 1560, y: 240, w: 200, h: 120, c: RED,  rot: 0,  from: [0, -160] },
            { k: 'ring', x: 1520, y: 640, w: 210, h: 210, c: TEAL, rot: 0,  from: [220, 0] },
            { k: 'diam', x: 1740, y: 430, w: 70,  h: 70,  c: WHITE, rot: 45, from: [120, 0] },
            { k: 'bar',  x: 1460, y: 470, w: 14,  h: 220, c: RED,  rot: 0,  from: [0, -180] },
          ],
        ];
        const set = presets[seed % presets.length];
        return (
          <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none' }}>
            {set.map((s, i) => {
              const st = start + i * 0.12;
              const p = seg(t, st, st + 0.6, Easing.easeOutBack);
              const dx = s.from[0] * (1 - p);
              const dy = s.from[1] * (1 - p);
              const amb = Math.sin((t + i) * 0.7) * 6;
              const base = {
                position: 'absolute', left: s.x, top: s.y, width: s.w, height: s.h,
                opacity: clamp(p * 1.3, 0, 1),
                transform: `translate(${dx}px, ${dy + amb}px) rotate(${s.rot}deg) scale(${0.6 + 0.4 * p})`,
              };
              if (s.k === 'rect') return <div key={i} style={{ ...base, background: s.c }} />;
              if (s.k === 'bar')  return <div key={i} style={{ ...base, background: s.c }} />;
              if (s.k === 'ring') return <div key={i} style={{ ...base, borderRadius: '50%',
                border: `${Math.max(8, s.w * 0.07)}px solid ${s.c}`, background: 'transparent' }} />;
              if (s.k === 'diam') return <div key={i} style={{ ...base, background: s.c }} />;
              return null;
            })}
          </div>
        );
      }

      // ── Seam wipe ────────────────────────────────────────────────────────────────
      // A skewed panel that covers the frame at t=0 and t=duration so a looping
      // Stage seams as a deliberate diagonal wipe instead of a hard cut.
      function SeamWipe({ duration, color = NAVY2, inDur = 0.6, outDur = 0.7 }) {
        const t = useTime();
        // covering at t=0, exits left by inDur; re-enters from left to cover by duration
        let x;
        if (t < inDur) x = -interpolate([0, 1], [0, 138])(Easing.easeInOutCubic(t / inDur));
        else if (t > duration - outDur) {
          const k = (t - (duration - outDur)) / outDur;
          x = -138 + 138 * Easing.easeInOutCubic(k);
        } else x = -138;
        return (
          <div style={{ position: 'absolute', top: -40, bottom: -40, left: 0, width: '120%',
            transform: `translateX(${x}%) skewX(-10deg)`, background: color, zIndex: 50,
            pointerEvents: 'none' }} />
        );
      }

      // ── Group card (specialty slides) ────────────────────────────────────────────
      // A group code + diriginte row that slides in. Reused on slides 2–4.
      function GroupRow({ code, teacher, x, y, w = 760, start = 0, color = RED, labelColor = TEAL }) {
        const t = useTime();
        const th = useTheme();
        const p = seg(t, start, start + 0.5, Easing.easeOutCubic);
        return (
          <div style={{ position: 'absolute', left: x, top: y, width: w,
            opacity: p, transform: `translateX(${(1 - p) * 44}px)`,
            display: 'flex', alignItems: 'center', gap: 26 }}>
            <div style={{ position: 'relative', flexShrink: 0 }}>
              <div style={{ background: color, color: WHITE, fontFamily: HEAD, fontWeight: 700,
                fontSize: 42, padding: '10px 24px', letterSpacing: '0.01em',
                clipPath: `inset(0 ${(1 - p) * 100}% 0 0)` }}>{code}</div>
            </div>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontFamily: BODY, fontWeight: 400, fontSize: 17, letterSpacing: '0.2em',
                color: labelColor, textTransform: 'uppercase', marginBottom: 4 }}>Diriginte</div>
              <div style={{ fontFamily: BODY, fontWeight: 600, fontSize: 31, color: th.ink,
                lineHeight: 1.05, whiteSpace: 'nowrap' }}>{teacher}</div>
            </div>
          </div>
        );
      }

      // ── Multi-line title block (bar-reveal per line) ─────────────────────────────
      // Roboto Slab headline; each line revealed behind an opening colored bar.
      function TitleBlock({
        lines, x = 160, y = 320, size = 84, start = 0, align = 'left',
        barColor = RED, color = null, weight = 700, lh = 1.02, letterSpacing = '-0.01em',
      }) {
        const t = useTime();
        const th = useTheme();
        const col = color || th.ink;
        return (
          <div style={{ position: 'absolute', top: y, left: 0, width: W,
            textAlign: align === 'center' ? 'center' : 'left',
            paddingLeft: align === 'center' ? 0 : x, paddingRight: align === 'center' ? 0 : 80,
            boxSizing: 'border-box' }}>
            {lines.map((ln, i) => {
              const st = start + i * 0.24;
              const grow = seg(t, st, st + 0.3, Easing.easeOutQuart);
              const open = seg(t, st + 0.3, st + 0.88, Easing.easeInOutCubic);
              const clip = `inset(0 ${(1 - open) * 100}% 0 0)`;
              return (
                <div key={i} style={{ lineHeight: lh }}>
                  <span style={{ position: 'relative', display: 'inline-block' }}>
                    <span style={{ display: 'block', fontFamily: HEAD, fontWeight: weight,
                      fontSize: size, color: col, lineHeight: lh, whiteSpace: 'nowrap',
                      letterSpacing, clipPath: clip }}>{ln}</span>
                    {(grow > 0 && open < 0.999) && (
                      <span style={{ position: 'absolute', top: '6%', bottom: '8%',
                        left: `${open * 100}%`, right: `${(1 - grow) * 100}%`, background: barColor }} />
                    )}
                    {open > 0.001 && open < 0.999 && (
                      <span style={{ position: 'absolute', top: 0, bottom: 0,
                        left: `calc(${open * 100}% - 5px)`, width: 5, background: th.ink,
                        boxShadow: `0 0 18px ${th.edgeShadow}` }} />
                    )}
                  </span>
                </div>
              );
            })}
          </div>
        );
      }

      // ── Ghost text (giant faint background word/letter) ──────────────────────────
      function GhostText({ text, top = -40, size = 620, start = 0, side = 'right',
        color = null, rot = -5, weight = 800 }) {
        const t = useTime();
        const th = useTheme();
        const col = color || th.ghost;
        const p = seg(t, start, start + 1.0, Easing.easeOutCubic);
        const dx = (1 - p) * 120 * (side === 'right' ? 1 : -1);
        const style = {
          position: 'absolute', top, fontFamily: HEAD, fontWeight: weight, fontSize: size,
          lineHeight: 0.82, color: col, whiteSpace: 'nowrap', letterSpacing: '-0.02em',
          transform: `translateX(${dx}px) rotate(${rot}deg)`, transformOrigin: 'center',
          opacity: p, pointerEvents: 'none', userSelect: 'none',
        };
        if (side === 'right') style.right = -40; else style.left = -40;
        return <div style={style}>{text}</div>;
      }

      // ── Side spine band (vertical accent that grows in) ──────────────────────────
      function SideBand({ side = 'left', color = RED, start = 0, x = 96, top = 250,
        height = 600, width = 10 }) {
        const t = useTime();
        const p = seg(t, start, start + 0.55, Easing.easeOutCubic);
        return (
          <div style={{ position: 'absolute', top, [side]: x, width,
            height: height * p, background: color, transformOrigin: 'top' }} />
        );
      }

      // ── Centered red/teal dash divider ───────────────────────────────────────────
      function Dashes({ x = W / 2, y = 0, start = 0, total = 360 }) {
        const t = useTime();
        const p = seg(t, start, start + 0.7, Easing.easeOutCubic);
        return (
          <div style={{ position: 'absolute', top: y, left: x - total / 2, width: total, height: 5,
            display: 'flex', gap: 6 }}>
            <div style={{ width: `${p * 55}%`, background: RED, height: '100%' }} />
            <div style={{ width: `${p * 35}%`, background: TEAL, height: '100%' }} />
          </div>
        );
      }

      // ── Common slide chrome: backdrop + corner marks + top-right logo ────────────
      function SlideFrame({ tint = 'teal', logoStart = 0.4, children }) {
        return (
          <React.Fragment>
            <Backdrop tint={tint} />
            <CornerMarks start={0.3} />
            <LogoBadge mode="corner" start={logoStart} x={1452} y={70} width={328} />
            {children}
          </React.Fragment>
        );
      }

      // ── Presentation stage (no chrome; monotonic clock; fills viewport) ──────────
      // Reveal plays once on entry then holds; ambient (sine-based) keeps living.
      // `sceneKey` change restarts the clock — used to replay on navigation.
      function SlideStage({ width = W, height = H, theme = THEMES.light, sceneKey = '0', children }) {
        const [time, setTime] = React.useState(0);
        const [scale, setScale] = React.useState(1);
        const wrapRef = React.useRef(null);

        React.useEffect(() => { setTime(0); }, [sceneKey]);

        React.useEffect(() => {
          let raf, last = null, stop = false;
          const step = (ts) => {
            if (stop) return;
            if (last == null) last = ts;
            const dt = Math.min(0.05, (ts - last) / 1000);
            last = ts;
            setTime((t) => t + dt);
            raf = requestAnimationFrame(step);
          };
          raf = requestAnimationFrame(step);
          return () => { stop = true; cancelAnimationFrame(raf); };
        }, [sceneKey]);

        React.useEffect(() => {
          const el = wrapRef.current;
          if (!el) return;
          const measure = () => setScale(Math.min(el.clientWidth / width, el.clientHeight / height));
          measure();
          const ro = new ResizeObserver(measure);
          ro.observe(el);
          window.addEventListener('resize', measure);
          return () => { ro.disconnect(); window.removeEventListener('resize', measure); };
        }, [width, height]);

        const ctx = React.useMemo(() => ({ time, duration: 999, playing: true,
          setTime, setPlaying() {} }), [time]);

        return (
          <div ref={wrapRef} style={{ position: 'absolute', inset: 0, background: '#000',
            display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
            <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'center',
              background: theme.bg, position: 'relative', overflow: 'hidden', flexShrink: 0 }}>
              <CeitiThemeContext.Provider value={theme}>
                <window.TimelineContext.Provider value={ctx}>{children}</window.TimelineContext.Provider>
              </CeitiThemeContext.Provider>
            </div>
          </div>
        );
      }

      // ── Confetti (slide 14) ──────────────────────────────────────────────────────
      function Confetti({ start = 0, count = 90 }) {
        const t = useTime();
        const lt = Math.max(0, t - start);
        const pieces = React.useMemo(() => {
          const arr = [];
          const golds = ['#f0b400', '#e8b923', '#d99500', '#caa12e', RED, TEAL, '#c9961f'];
          for (let i = 0; i < count; i++) {
            const seed = (i * 9301 + 49297) % 233280 / 233280;
            const seed2 = (i * 4021 + 1231) % 99991 / 99991;
            const seed3 = (i * 7507 + 3119) % 88883 / 88883;
            arr.push({
              x: seed * W,
              delay: seed2 * 1.6,
              dur: 3.2 + seed3 * 2.4,
              sway: 30 + seed2 * 70,
              size: 10 + seed3 * 16,
              rot: seed * 360,
              spin: (seed2 - 0.5) * 8,
              color: golds[i % golds.length],
              round: i % 4 === 0,
            });
          }
          return arr;

              const local = lt - p.delay;

              const cycle = (local % p.dur) / p.dur;
              const yPos = -40 + cycle * (H + 120);
              const xPos = p.x + Math.sin((local + i) * 1.6) * p.sway;
              const op = clamp(local * 1.5, 0, 1) * (cycle > 0.85 ? (1 - cycle) / 0.15 : 1);
              return (

                  width: p.size, height: p.round ? p.size : p.size * 0.5,
                  background: p.color, borderRadius: p.round ? '50%' : 2,
                  transform: `rotate(${p.rot + local * p.spin * 40}deg)`,
                  opacity: op }} />
              );
            })}
          </div>
        );

      // ceiti-deck.jsx — fullscreen presentation shell with arrow-key + button nav.
      // Renders one animated scene at a time; navigating restarts that scene's animation.

      function CEITIDeck() {
        const SCENES = window.CEITI_SCENES;
        const { RED, TEAL } = window.CEITI;
        const THEMES = window.THEMES;
        const total = SCENES.length;

        const [theme, setTheme] = React.useState(null);   // null = landing menu
        const [idx, setIdx] = React.useState(0);
        const [visit, setVisit] = React.useState(0);
        const [uiVisible, setUiVisible] = React.useState(true);
        const hideTimer = React.useRef(null);

        const start = React.useCallback((name) => { setTheme(THEMES[name]); setIdx(0); setVisit((v) => v + 1); }, [THEMES]);
        const home = React.useCallback(() => { setTheme(null); setIdx(0); }, []);

        const clampIdx = (n) => Math.max(0, Math.min(total - 1, n));
        const go = React.useCallback((d) => setIdx((i) => clampIdx(i + d)), [total]);
        const jump = React.useCallback((n) => setIdx(clampIdx(n)), [total]);
        const replay = React.useCallback(() => setVisit((v) => v + 1), []);

        const toggleFs = React.useCallback(() => {
          if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
          else document.exitFullscreen?.();
        }, []);

        // keyboard navigation
        React.useEffect(() => {
          const onKey = (e) => {
            const k = e.key;
            if (k === 'Escape') { home(); return; }
            if (!theme) return;
            if (k === 'ArrowRight' || k === 'PageDown' || k === ' ' || k === 'Enter') { e.preventDefault(); go(1); }
            else if (k === 'ArrowLeft' || k === 'PageUp' || k === 'Backspace') { e.preventDefault(); go(-1); }
            else if (k === 'Home') { jump(0); }
            else if (k === 'End') { jump(total - 1); }
            else if (k === 'r' || k === 'R') { replay(); }
            else if (k === 'f' || k === 'F') { toggleFs(); }
          };
          window.addEventListener('keydown', onKey);
          return () => window.removeEventListener('keydown', onKey);
        }, [go, jump, replay, toggleFs, home, theme, total]);

        // auto-hide chrome after inactivity
        React.useEffect(() => {
          const wake = () => {
            setUiVisible(true);
            clearTimeout(hideTimer.current);
            hideTimer.current = setTimeout(() => setUiVisible(false), 3000);
          };
          wake();
          window.addEventListener('mousemove', wake);
          window.addEventListener('keydown', wake);
          window.addEventListener('touchstart', wake);
          return () => {
            window.removeEventListener('mousemove', wake);
            window.removeEventListener('keydown', wake);
            window.removeEventListener('touchstart', wake);
            clearTimeout(hideTimer.current);
          };
        }, []);

        const [isFs, setIsFs] = React.useState(false);
        React.useEffect(() => {
          const h = () => setIsFs(!!document.fullscreenElement);
          document.addEventListener('fullscreenchange', h);
          return () => document.removeEventListener('fullscreenchange', h);
        }, []);

        const cur = SCENES[idx];
        const Comp = cur.comp;
        const pad2 = (n) => String(n).padStart(2, '0');

        // ── Landing menu ──
        if (!theme) {

                <img src={logoDark} alt="CEITI" style={{ height: 84, marginBottom: 30, objectFit: 'contain' }} />
                <div style={{ fontFamily: "'Roboto Slab', serif", fontWeight: 700, fontSize: 52,
                  color: '#f3f6f8', letterSpacing: '-0.01em', lineHeight: 1 }}>GRADUATION 2026</div>
                <div style={{ fontSize: 21, letterSpacing: '0.06em', color: 'rgba(243,246,248,0.6)', marginTop: 16 }}>
                  Alege fundalul prezentării</div>
              </div>
              <div style={{ display: 'flex', gap: 36 }}>
                {/* white */}
                <div onClick={() => start('light')}
                  onMouseEnter={(e) => { e.currentTarget.style.transform = 'translateY(-6px)'; e.currentTarget.style.boxShadow = '0 24px 60px rgba(0,0,0,0.45)'; }}
                  onMouseLeave={(e) => { e.currentTarget.style.transform = 'none'; e.currentTarget.style.boxShadow = 'none'; }}
                  style={{ ...card, background: '#f4f6f8', borderColor: 'rgba(0,0,0,0.08)' }}>
                  <img src={logoLight} alt="" style={{ height: 54, objectFit: 'contain' }} />
                  <div style={{ fontFamily: "'Roboto Slab', serif", fontWeight: 700, fontSize: 30, color: '#1a293a' }}>Fundal Alb</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 9, fontSize: 15,
                    letterSpacing: '0.14em', textTransform: 'uppercase', color: '#df163c', fontWeight: 700 }}>
                    <span style={{ width: 11, height: 11, borderRadius: '50%', border: '2px solid #cdd5db', background: '#fff' }} /> Pornește</div>
                </div>
                {/* blue */}
                <div onClick={() => start('dark')}
                  onMouseEnter={(e) => { e.currentTarget.style.transform = 'translateY(-6px)'; e.currentTarget.style.boxShadow = '0 24px 60px rgba(0,0,0,0.55)'; }}
                  onMouseLeave={(e) => { e.currentTarget.style.transform = 'none'; e.currentTarget.style.boxShadow = 'none'; }}
                  style={{ ...card, background: '#1a293a', borderColor: 'rgba(255,255,255,0.12)' }}>
                  <img src={logoDark} alt="" style={{ height: 54, objectFit: 'contain' }} />
                  <div style={{ fontFamily: "'Roboto Slab', serif", fontWeight: 700, fontSize: 30, color: '#f3f6f8' }}>Fundal Albastru</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 9, fontSize: 15,
                    letterSpacing: '0.14em', textTransform: 'uppercase', color: '#20a4a2', fontWeight: 700 }}>
                    <span style={{ width: 11, height: 11, borderRadius: '50%', border: '2px solid #20a4a2', background: '#1a293a' }} /> Pornește</div>
                </div>
              </div>
            </div>
          );
        }

        const navBtn = {
          width: 52, height: 52, borderRadius: '50%', border: '1px solid rgba(255,255,255,0.18)',
          background: 'rgba(26,41,58,0.72)', color: '#fff', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          backdropFilter: 'blur(6px)', WebkitBackdropFilter: 'blur(6px)', padding: 0,
          fontFamily: "'Open Sans', sans-serif", transition: 'background 150ms, opacity 150ms',
        };
        const edgeZone = (side) => ({
          position: 'absolute', top: 0, bottom: 90, width: '14%', [side]: 0,
          cursor: 'pointer', zIndex: 5,
        });

        return (
          <div data-screen-label={`Slide ${pad2(idx + 1)}`}
            style={{ position: 'fixed', inset: 0, background: '#000', overflow: 'hidden',
              fontFamily: "'Open Sans', system-ui, sans-serif",
              cursor: uiVisible ? 'default' : 'none' }}>

            {/* the animated scene */}
            <SlideStage sceneKey={`${theme.bg}-${idx}-${visit}`} theme={theme}>
              <Comp />
            </SlideStage>

            {/* edge click zones (operator can click left/right margins to advance) */}
            <div style={edgeZone('left')} onClick={() => go(-1)} title="Slide anterior" />
            <div style={edgeZone('right')} onClick={() => go(1)} title="Slide următor" />

            {/* fullscreen + home buttons — hidden while in fullscreen */}
            {!isFs && (
              <div style={{ position: 'absolute', right: 26, bottom: 26, zIndex: 20, display: 'flex', gap: 10,
                opacity: uiVisible ? 1 : 0, transition: 'opacity 350ms',
                pointerEvents: uiVisible ? 'auto' : 'none' }}>
                <button style={{ ...navBtn, width: 46, height: 46 }} onClick={home} title="Meniu (Esc)"
                  onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(223,22,60,0.85)'}
                  onMouseLeave={(e) => e.currentTarget.style.background = 'rgba(26,41,58,0.72)'}>
                  <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M3 11l9-8 9 8M5 9.5V20h5v-6h4v6h5V9.5" stroke="currentColor" strokeWidth="2.1" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
                <button style={{ ...navBtn, width: 46, height: 46 }} onClick={toggleFs} title="Ecran complet (F)"
                  onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(223,22,60,0.85)'}
                  onMouseLeave={(e) => e.currentTarget.style.background = 'rgba(26,41,58,0.72)'}>
                  <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
              </div>
            )}
          </div>
        );
      }

      window.CEITIDeck = CEITIDeck;
    </script>

    <script>
      // Transforma sursa JSX cu runtime clasic (React.createElement) si o ruleaza.
      (function () {
        var src = document.getElementById("app-source").textContent;
        var code = Babel.transform(src, {
          presets: [["react", { runtime: "classic" }]],
        }).code;
        (0, eval)(code);
        ReactDOM.createRoot(document.getElementById("root")).render(
          React.createElement(window.CEITIDeck),
        );
      })();
    </script>
  </body>
</html>
